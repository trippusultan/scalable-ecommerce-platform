name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Run integration tests
        env:
          JWT_SECRET: test-secret
          EVENT_BUS: memory
        run: pytest tests/ -q

      - name: Verify each service compiles
        run: |
          python -m compileall -q common user_service product_service cart_service \
            payment_service order_service notification_service gateway
