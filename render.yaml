# Render blueprint — single-container deploy of the whole Aslu. platform.
#
# One Docker web service runs the gateway (public, on $PORT) plus all 6 backend
# services on internal localhost ports (see container_entrypoint.py). This is the
# reliable free-tier topology: one cold start, localhost-fast internal calls, no
# cross-service discovery timeouts.
#
# Secrets are NOT in this file — set JWT_SECRET in the Render dashboard (or it is
# generated below). CORS_ORIGINS should include the Firebase Hosting origin.
#
# (For a true one-service-per-component microservice deploy, use the per-service
#  variant with SERVICE=<pkg> env on each service — see DEPLOY.md.)

services:
  - type: web
    name: aslu-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://aslustore.web.app,https://aslustore.firebaseapp.com
      - key: EVENT_BUS
        value: memory
      - key: DATA_DIR
        value: /tmp/ecom-data
